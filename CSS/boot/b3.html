<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        .box {
            height: 300px;
            width: 250px;
            background: #efb1b1;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;

        }

        img {
            height: 100px;
            width: 100px;
            border-radius: 50%;

        }
    </style>



</head>

<body>

    <div class="container-fluid">
        <div class="container">


            <section class="row">
                <section class="col-12 col-sm-6 col-lg-4 bg-secondary d-flex justify-content-center p-5 px-sm-1">
                    <div class="box p-2">
                        <img src="https://images.unsplash.com/photo-1779896412214-52031d27211a?q=80&w=1015&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            class="mb-4">
                        <h4>ISO 9001:2015</h4>
                        <p>Certified Quality Management System for Training Excellence</p>
                    </div>
                </section>
                <section class="col-12 col-sm-6 col-lg-4 bg-secondary d-flex justify-content-center p-5 px-sm-1">
                    <div class="box p-2">
                        <img src="https://images.unsplash.com/photo-1779896412214-52031d27211a?q=80&w=1015&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            class="mb-4">
                        <h4>IAF Certified</h4>
                        <p>International Accreditation Forum Recognition</p>
                    </div>
                </section>
                <section class="col-12 col-sm-6 col-lg-4 bg-secondary d-flex justify-content-center p-5 px-sm-1">
                    <div class="box p-2">
                        <img src="https://images.unsplash.com/photo-1779896412214-52031d27211a?q=80&w=1015&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            class="mb-4">
                        <h4>DAkkS Certified</h4>
                        <p>German Accreditation Body Recognition</p>
                    </div>
                </section>

            </section>






        </div>
    </div>










    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
